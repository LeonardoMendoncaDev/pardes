<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
	<defs>
		<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#4a3b7c"/>
			<stop offset="100%" stop-color="#2d2350"/>
		</linearGradient>
	</defs>

	<rect width="1200" height="630" fill="url(#bg)"/>

	<!-- subtle top-right accent -->
	<circle cx="1100" cy="100" r="180" fill="#9d88d4" opacity="0.08"/>
	<circle cx="80" cy="560" r="140" fill="#9d88d4" opacity="0.06"/>

	<!-- title -->
	<text x="600" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="180" font-weight="400"
		text-anchor="middle" fill="#ffffff" letter-spacing="12">PARDES</text>

	<!-- subtitle -->
	<text x="600" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="400"
		text-anchor="middle" fill="#e5dcf5" font-style="italic">
		Desenvolvimento orientado pela intenção
	</text>

	<!-- four layers -->
	<text x="600" y="420" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400"
		text-anchor="middle" fill="#b8a4e0" letter-spacing="12">
		Peshat · Remez · Drash · Sod
	</text>

	<!-- footer -->
	<text x="600" y="570" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="400"
		text-anchor="middle" fill="#9d88d4">
		pardes.pro   ·   por Leonardo Mendonça
	</text>
</svg>
